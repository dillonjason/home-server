input_datetime:
  guest_override_until:
    name: Guest override until
    has_date: true
    has_time: false
template:
  - binary_sensor:
      - name: Guest Override Active
        unique_id: guest_override_active
        state: >
          {% set s = states('input_datetime.guest_override_until') %}
          {% if s in ['unknown','unavailable',''] %} false
          {% else %}
            {% set cutoff = as_datetime(s).date() %}
            {{ now().date() < cutoff }}
          {% endif %}
script:
  guest_override_clear_today:
    alias: Guest Override • Clear (today)
    sequence:
      - service: input_datetime.set_datetime
        data:
          entity_id: input_datetime.guest_override_until
          date: "{{ now().date().isoformat() }}"

  split_temp_override_clear:
    alias: Splits Override • Clear Next Day
    mode: single
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.splits_temp_override_mode
        data:
          option: "Off"

input_select:
  splits_temp_override_mode:
    name: Splits Temp Override Mode
    options:
      - "Off"
      - "Cool"
      - "Heat"
      - "Fan"
    icon: mdi:thermostat-auto

automation:
  - alias: "Splits Override • Clear at 06:35"
    id: splits_override_clear_0635
    description: >-
      Resets splits_temp_override_mode to Off each morning at 06:35,
      5 min after the Seasonal HVAC automation runs. Triggers the HVAC
      automation to re-evaluate with no override.
    triggers:
      - trigger: time
        at: "06:35:00"
    conditions: []
    actions:
      - action: script.split_temp_override_clear
    mode: single