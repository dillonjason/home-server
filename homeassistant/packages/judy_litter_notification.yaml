template:
  - binary_sensor:
      # 1) Stabilize the raw occupancy (ignore ultra-short blips)
      - name: "Judy Litter Occupancy (stable)"
        unique_id: judy_litter_occupancy_stable
        state: "{{ is_state('binary_sensor.judy_litter_sensor_occupancy','on') }}"
        # Require 8s continuous 'on' to register; 10s 'off' to clear
        delay_on: "00:00:08"
        delay_off: "00:00:10"

      # 2) Session window that merges close-together blips into one visit
      - name: "Judy Litter Session"
        unique_id: judy_litter_session
        state: "{{ is_state('binary_sensor.judy_litter_occupancy_stable','on') }}"
        # Keep the session 'on' for 5 min after last motion to merge re-entries
        delay_off: "00:05:00"

automation:
  - id: judy_litter_visit_alert_hourly
    alias: Judy Litter Visit Alert — Hourly between 7a–11p
    initial_state: true

    trigger:
      # Fires every hour at :00
      - platform: time_pattern
        minutes: "0"
      # Optional: also run once after HA restarts
      - platform: homeassistant
        event: start

    condition:
      - condition: numeric_state
        entity_id: counter.judy_litter_visits
        above: 3
      - condition: time
        after: "07:00:00"
        before: "23:00:00"

    action:
      - parallel:
          - if:
              - condition: state
                entity_id: person.nick
                state: "home"
            then:
              - service: notify.mobile_app_pixel_8_pro
                data:
                  title: "Judy’s been busy"
                  message: "Visits: {{ states('counter.judy_litter_visits') }}"
                  data:
                    actions:
                      - action: "RESET_JUDY_COUNTER"
                        title: "Litter Cleaned"
          - if:
              - condition: state
                entity_id: person.dillon
                state: "home"
            then:
              - service: notify.mobile_app_dillons_iphone
                data:
                  title: "Judy’s been busy"
                  message: "Visits: {{ states('counter.judy_litter_visits') }}"
                  data:
                    actions:
                      - action: "RESET_JUDY_COUNTER"
                        title: "Litter Cleaned"

    mode: single