###############################################################################
# Washer Power Monitoring & Notification Package
# Components:
#  1) Template binary sensor - determines when washer is running (debounced)
#  2) Input datetime helper - stores last washer start time
#  3) Automation - stamps start time when washer turns on
#  4) Automation - notifies when washer finishes (min runtime + cooldown)
###############################################################################

template:
  - binary_sensor:
      - name: "Washer Running"
        unique_id: washer_running_debounced
        device_class: running
        # ON when power > 25 W (well above idle ~8 W)
        state: >
          {{ states('sensor.washer_power_minute_average')|float(0) > 25 }}
        availability: >
          {{ states('sensor.washer_power_minute_average')|is_number }}
        # Debounce:
        delay_on:
          minutes: 2        # must stay above 25 W for 2 minutes to count as running
        delay_off:
          minutes: 8        # must stay below 25 W for 8 minutes to count as stopped

###############################################################################
# Helper - stores the datetime when the washer last started
###############################################################################
input_datetime:
  washer_started:
    name: Washer Started
    has_date: true
    has_time: true

###############################################################################
# Automations
###############################################################################
automation:
  # 1) Stamp the start time when washer begins a cycle
  - alias: Washer Cycle Started Timestamp
    id: washer_started_timestamp
    trigger:
      - platform: state
        entity_id: binary_sensor.washer_running
        from: "off"
        to: "on"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.washer_started
        data:
          datetime: "{{ now().isoformat() }}"
    mode: single

  # 2) Notify when washer finishes (ON -> OFF), with guards
  - alias: Washer Done Notification
    id: washer_done_notification
    description: "Notify when washer finished after a real cycle"
    trigger:
      - platform: state
        entity_id: binary_sensor.washer_running
        from: "on"
        to: "off"

    condition:
      # Minimum runtime: must have run at least 10 minutes
      - condition: template
        value_template: >
          {% set start = states('input_datetime.washer_started') %}
          {{ start != 'unknown' and (as_timestamp(now()) - as_timestamp(start)) > 600 }}

      # Cooldown: last alert must be > 10 minutes ago
      - condition: template
        value_template: >
          {% set last = state_attr(this.entity_id,'last_triggered') %}
          {{ last is none or (as_timestamp(now()) - as_timestamp(last)) > 600 }}

    action:
      - service: script.notify_people_who_are_home
        data:
          message: "Washer is done!"
    mode: single