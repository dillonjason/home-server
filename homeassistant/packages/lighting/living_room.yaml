# packages/lighting/living_room.yaml
# Living room lighting automations.
# Controls the living room lights via the physical switch.

automation:
  - id: '1699191016782'
    alias: Living room switch on
    description: ''
    trigger:
      - platform: device
        type: turned_on
        device_id: 3aaf3199504ec7d3d7585f9ca518c13f
        entity_id: ad0f4baeb9f0d546fc8b7738649b325e
        domain: switch
    condition: []
    action:
      - action: light.turn_on
        target:
          entity_id: light.living_room_lights
    mode: single

  - id: '1702223565790'
    alias: Living room switch off
    description: ''
    trigger:
      - platform: device
        type: turned_off
        device_id: 3aaf3199504ec7d3d7585f9ca518c13f
        entity_id: ad0f4baeb9f0d546fc8b7738649b325e
        domain: switch
    condition: []
    action:
      - action: light.turn_off
        target:
          entity_id: light.living_room_lights
    mode: single
