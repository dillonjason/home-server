- id: '1760066127120'
  alias: Seasonal HVAC (OWM • day/night + fan-only shoulder + override)
  description: Two triggers (06:30, 21:45) with optional Cool/Heat/Fan override.
  triggers:
  - id: morning
    trigger: time
    at: 06:30:00
  - id: night
    trigger: time
    at: '21:45:00'
  - trigger: state
    entity_id: input_select.splits_temp_override_mode
  actions:
  - action: weather.get_forecasts
    target:
      entity_id: weather.openweathermap
    data:
      type: daily
    response_variable: owm
  - variables:
      COOL_DAY_ON_ABOVE: 75
      HEAT_DAY_ON_BELOW: 60
      todays_high: "{{ owm['weather.openweathermap'].forecast[0].temperature | float(0)\n
        \  if owm and 'weather.openweathermap' in owm else 0 }}"
      now_hms: '{{ now().strftime(''%H:%M:%S'') }}'
      branch: "{% if trigger is defined and trigger.id %}\n  {{ trigger.id }}\n{%
        else %}\n  {% if now_hms >= '21:45:00' or now_hms < '06:30:00' %}night{% else
        %}morning{% endif %}\n{% endif %}"
      override: '{{ states(''input_select.splits_temp_override_mode'') }}'
  - action: logbook.log
    data:
      name: Seasonal HVAC
      message: branch={{ branch }}, todays_high={{ todays_high }}, override={{ override
        }}
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ override != ''Off'' }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ override == ''Cool'' }}'
          sequence:
          - action: script.splits_apply_preset
            data:
              preset: '{{ ''summer_day'' if branch == ''morning'' else ''summer_night''
                }}'
        - conditions:
          - condition: template
            value_template: '{{ override == ''Heat'' }}'
          sequence:
          - action: script.splits_apply_preset
            data:
              preset: '{{ ''winter_day'' if branch == ''morning'' else ''winter_night''
                }}'
        - conditions:
          - condition: template
            value_template: '{{ override == ''Fan'' }}'
          sequence:
          - action: script.splits_apply_preset
            data:
              preset: '{{ ''fan_day'' if branch == ''morning'' else ''fan_night''
                }}'
    - conditions:
      - condition: template
        value_template: '{{ override == ''Off'' and branch == ''morning'' }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ todays_high >= COOL_DAY_ON_ABOVE }}'
          sequence:
          - action: script.splits_apply_preset
            data:
              preset: summer_day
        - conditions:
          - condition: template
            value_template: '{{ todays_high <= HEAT_DAY_ON_BELOW }}'
          sequence:
          - action: script.splits_apply_preset
            data:
              preset: winter_day
        default:
        - action: script.splits_apply_preset
          data:
            preset: fan_day
    - conditions:
      - condition: template
        value_template: '{{ override == ''Off'' and branch == ''night'' }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ todays_high <= HEAT_DAY_ON_BELOW }}'
          sequence:
          - action: script.splits_apply_preset
            data:
              preset: winter_night
        - conditions:
          - condition: template
            value_template: '{{ todays_high > HEAT_DAY_ON_BELOW }}'
          sequence:
          - action: script.splits_apply_preset
            data:
              preset: summer_night
  mode: single
