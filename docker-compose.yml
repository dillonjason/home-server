secrets:
  jwt:
    file: ./authelia/secrets/jwt
  encryption_key:
    file: ./authelia/secrets/encryption_key
  smtp:
    file: ./authelia/secrets/smtp
  session:
    file: ./authelia/secrets/session

volumes:
  prometheus-data:
    driver: local
  portainer-data:
    driver: local

networks:
  default:
      ipam:
        config:
         - subnet: 172.24.0.0/24
  swag_proxy:
    external: true

services:
  swag:
    image: ghcr.io/linuxserver/swag
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
      - URL=dillonjason.dev
      - SUBDOMAINS=apollo,code-server,openclaw
      - VALIDATION=dns
      - DNSPLUGIN=cloudflare
      - EMAIL=djasuar@gmail.com
      - PROPAGATION=60
    volumes:
      - ./swag/config:/config
    ports:
      - 443:443
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1
    networks:
      - default
      - swag_proxy

  authelia:
    image: authelia/authelia
    container_name: authelia
    secrets:
      - jwt
      - smtp
      - encryption_key
      - session
    environment:
      - AUTHELIA_JWT_SECRET_FILE=/run/secrets/jwt
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/run/secrets/encryption_key
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE=/run/secrets/smtp
      - AUTHELIA_SESSION_SECRET_FILE=/run/secrets/session
      - TZ=America/New_York
      - PUID=1000
      - PGID=985
    volumes:
      - ./authelia/config:/config
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  homer:
    image: b4bz/homer:latest
    volumes:
      - ./homer/assets:/www/assets
    ports:
      - 8080:8080
    environment:
      - UID=1000
      - GID=985
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    # user: uid:gid
    # network_mode: "bridge"
    ports:
      - 8096:8096
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /mnt/Media/media:/media
    restart: "unless-stopped"
    environment:
      - TZ=America/New_York
      - UID=1000
      - GID=985
    mem_limit: 4g
    cpus: 2

  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    volumes:
      - ./code-server/config/.ssh:/home/coder/.ssh
      - ./code-server/config:/home/coder/.config
      - ./code-server/data:/home/coder/.local/share/code-server
      - /home/dillon/Projects:/home/coder/project
      - /home/dillon/Packages/home-server:/home/coder/home-server
      - /home/dillon/Packages/openclaw:/home/coder/openclaw
      - /home/dillon/.openclaw:/home/coder/openclaw-config
    environment:
      - UID=1000
      - GID=985
      - DOCKER_USER=$USER
      - TZ=America/New_York
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2

  transmission:
    image: haugene/transmission-openvpn
    container_name: transmission
    restart: "unless-stopped"
    volumes:
      - ./transmission/config:/config
      - /mnt/Media/torrents:/downloads
    ports:
      - 9091:9091
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    env_file:
      - ./transmission/.env
    mem_limit: 512m
    cpus: 1

  redis:
    image: redis:alpine
    container_name: redis
    volumes:
      - ./redis/data:/data
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    mem_limit: 128m
    cpus: 0.25

  jackett:
    image: lscr.io/linuxserver/jackett
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
      - AUTO_UPDATE=true
    volumes:
      - ./jackett/config:/config
      - ./jackett/downloads:/downloads
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
    volumes:
      - ./sonarr/config:/config
      - /mnt/Media:/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
    volumes:
      - ./radarr/config:/config
      - /mnt/Media:/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1

  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    user: "1000"
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
      - GF_SERVER_ROOT_URL=https://apollo.dillonjason.dev/grafana
      - GF_SERVER_DOMAIN=https://apollo.dillonjason.dev/
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/config/grafana.ini:/etc/grafana/grafana.ini
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/config:/config
      - prometheus-data:/prometheus
    restart: unless-stopped
    command:
      - "--config.file=/config/prometheus.yml"
      - "--web.external-url=https://prometheus.dillonjason.dev"
      - "--web.route-prefix=/"
      - "--storage.tsdb.retention.time=30d"
    mem_limit: 1g
    cpus: 1

  node_exporter:
    image: quay.io/prometheus/node-exporter
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'
    mem_limit: 128m
    cpus: 0.25

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    mem_limit: 256m
    cpus: 0.5

  virt-manager:
    image: mber5/virt-manager
    container_name: virt-manager
    ports:
      - 8185:80
    restart: always
    environment:
      HOSTS: "['qemu:///system']"
    volumes:
      - "/var/run/libvirt/libvirt-sock:/var/run/libvirt/libvirt-sock"
      - "/var/lib/libvirt/images:/var/lib/libvirt/images"
      - "/dev/disk:/dev/disk"
    devices:
      - "/dev/kvm:/dev/kvm"
    mem_limit: 256m
    cpus: 0.5

  homebridge:
    image: homebridge/homebridge:latest
    container_name: homebridge
    restart: always
    network_mode: host
    ports:
      - '8581:8581'
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
      - HOMEBRIDGE_CONFIG_UI_PORT=8581
    volumes:
      - ./homebridge:/homebridge
    mem_limit: 512m
    cpus: 0.5

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
    volumes:
      - ./bazarr:/config
      - /mnt/Media:/data
    ports:
      - 6767:6767
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    environment:
      - PUID=1000
      - PGID=985
      - TZ=America/New_York
    volumes:
      - ./homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/serial/by-id/usb-SMLIGHT_SMLIGHT_SLZB-06_12a38960836eef11b349e9c2c169b110-if00-port0:/dev/serial/by-id/usb-SMLIGHT_SMLIGHT_SLZB-06_12a38960836eef11b349e9c2c169b110-if00-port0
    restart: unless-stopped
    privileged: true
    network_mode: host
    mem_limit: 1g
    cpus: 2

  valheim:
    container_name: valheim
    image: ghcr.io/lloesche/valheim-server
    cap_add:
      - sys_nice
    volumes:
      - ./valheim-server/config:/config
      - ./valheim-server/data:/opt/valheim
    ports:
      - "2456-2458:2456-2458/udp"
      - "9001:9001/tcp"
    env_file:
      - ./valheim-server/valheim.env
    restart: always
    stop_grace_period: 2m
    network_mode: host
    mem_limit: 4g
    cpus: 2

  airconnect:
    container_name: airconnect
    image: 1activegeek/airconnect
    restart: unless-stopped
    network_mode: host
    mem_limit: 64m
    cpus: 0.25
